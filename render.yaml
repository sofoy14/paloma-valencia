# Configuracion para deploy en Render.com
services:
  - type: web
    name: paloma-monitoreo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: CALLMEBOT_APIKEY
        sync: false
      - key: CALLMEBOT_PHONE
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NEWS_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
