<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paloma Valencia - Monitor Electoral</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; color: #4a9eff; }
        .subtitle { color: #888; font-size: 1.1em; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #333;
        }
        .stat-number { font-size: 2.5em; font-weight: bold; color: #4a9eff; }
        .stat-label { color: #888; font-size: 0.9em; }
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 10px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #4a9eff;
            border-color: #4a9eff;
        }
        .article-card {
            background: #1a1a1a;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #4a9eff;
            transition: all 0.3s;
        }
        .article-card:hover { transform: translateX(5px); }
        .article-card.alert { border-left-color: #ff4444; background: #2a1a1a; }
        .article-title {
            color: #fff;
            font-size: 1.2em;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }
        .article-title:hover { color: #4a9eff; }
        .article-meta {
            display: flex;
            gap: 15px;
            color: #666;
            font-size: 0.9em;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-right: 5px;
        }
        .sentiment-positive { background: #1a4a1a; color: #4cff4c; }
        .sentiment-negative { background: #4a1a1a; color: #ff4c4c; }
        .sentiment-neutral { background: #333; color: #aaa; }
        .badge.alert { background: #ff4444; color: #fff; }
        .badge.hot { background: #ff8800; color: #fff; }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification.info { background: #4a9eff; color: #fff; }
        .notification.warning { background: #ff8800; color: #fff; }
        .last-update { color: #666; font-size: 0.85em; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕊️ Paloma Valencia</h1>
            <p class="subtitle">Monitor Electoral - Colombia 2026</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="stat-total">-</div>
                <div class="stat-label">Noticias</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-positive">-</div>
                <div class="stat-label">Positivas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-negative">-</div>
                <div class="stat-label">Negativas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-alerts">-</div>
                <div class="stat-label">Alertas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-high">-</div>
                <div class="stat-label">Alta Relevancia</div>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterNews('all')">Todas</button>
            <button class="filter-btn" onclick="filterNews('high')">🔥 Alta Relevancia</button>
            <button class="filter-btn" onclick="filterNews('alert')">🚨 Alertas</button>
            <button class="filter-btn" onclick="filterNews('positive')">✅ Positivas</button>
            <button class="filter-btn" onclick="filterNews('negative')">⚠️ Negativas</button>
            <button class="filter-btn" onclick="refreshNews()" style="margin-left: auto;">🔄 Actualizar</button>
        </div>
        
        <div id="articles-list">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando noticias...</p>
            </div>
        </div>
        
        <div class="last-update" id="last-update">Cargando...</div>
    </div>
    
    <script src="app-vercel.js"></script>
</body>
</html>
